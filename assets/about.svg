<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Декоративная иллюстрация — огонь и тарелка">
  <defs>
    <radialGradient id="emberGlow" cx="50%" cy="55%" r="55%">
      <stop offset="0%"  stop-color="#3a2510" stop-opacity="1"/>
      <stop offset="45%" stop-color="#1a140c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0a08" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"  stop-color="#f2ca50"/>
      <stop offset="55%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6a1f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8a6a1f" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="750" fill="url(#emberGlow)"/>

  <!-- Faint decorative dots -->
  <g fill="#d4af37" opacity="0.12">
    <circle cx="80" cy="120" r="1.2"/>
    <circle cx="520" cy="180" r="1.2"/>
    <circle cx="140" cy="640" r="1.2"/>
    <circle cx="480" cy="610" r="1.2"/>
    <circle cx="300" cy="80" r="1.2"/>
    <circle cx="60" cy="360" r="1.2"/>
    <circle cx="540" cy="420" r="1.2"/>
  </g>

  <!-- Plate (ellipse top view, tilted) -->
  <g transform="translate(300 470)">
    <ellipse cx="0" cy="0" rx="220" ry="55" fill="none" stroke="url(#plate)" stroke-width="1.5" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="195" ry="48" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="140" ry="34" fill="#d4af37" opacity="0.06"/>

    <!-- Small dish accents -->
    <circle cx="-40" cy="-6" r="5" fill="#d4af37" opacity="0.7"/>
    <circle cx="-22" cy="4" r="3" fill="#f2ca50" opacity="0.8"/>
    <circle cx="10" cy="-4" r="4" fill="#d4af37" opacity="0.6"/>
    <circle cx="35" cy="6" r="3" fill="#f2ca50" opacity="0.7"/>
    <path d="M-60 2 Q-50 -8 -38 0" stroke="#d4af37" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M20 -2 Q32 -10 44 -2" stroke="#f2ca50" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Central flame -->
  <g transform="translate(300 330)" filter="url(#soften)">
    <path d="M0 120
             C -55 70, -55 30, -20 -10
             C -30 -60, -10 -90, 0 -140
             C 15 -95, 25 -60, 35 -30
             C 55 0, 50 60, 20 100
             C 10 115, 0 120, 0 120 Z"
          fill="url(#flame)" opacity="0.85"/>
    <path d="M0 90
             C -25 60, -25 30, -8 0
             C -2 -30, 5 -60, 10 -95
             C 18 -55, 28 -20, 25 10
             C 22 50, 10 80, 0 90 Z"
          fill="#f2ca50" opacity="0.7"/>
    <path d="M2 70
             C -12 50, -10 25, 0 0
             C 6 -25, 10 -45, 14 -70
             C 16 -35, 18 -10, 16 15
             C 14 40, 6 65, 2 70 Z"
          fill="#fff3c9" opacity="0.5"/>
  </g>

  <!-- Ember particles -->
  <g fill="#f2ca50">
    <circle cx="250" cy="240" r="1.5" opacity="0.8"/>
    <circle cx="360" cy="200" r="1" opacity="0.6"/>
    <circle cx="220" cy="180" r="1.2" opacity="0.7"/>
    <circle cx="340" cy="150" r="1" opacity="0.5"/>
    <circle cx="280" cy="140" r="1.3" opacity="0.8"/>
    <circle cx="320" cy="110" r="0.8" opacity="0.5"/>
    <circle cx="260" cy="90" r="1" opacity="0.6"/>
    <circle cx="310" cy="70" r="0.9" opacity="0.4"/>
  </g>

  <!-- Subtle bottom glow -->
  <ellipse cx="300" cy="490" rx="180" ry="12" fill="#d4af37" opacity="0.15" filter="url(#soften)"/>

  <!-- Frame corners (deco) -->
  <g stroke="#d4af37" stroke-width="1" fill="none" opacity="0.35">
    <path d="M30 30 L60 30 M30 30 L30 60"/>
    <path d="M570 30 L540 30 M570 30 L570 60"/>
    <path d="M30 720 L60 720 M30 720 L30 690"/>
    <path d="M570 720 L540 720 M570 720 L570 690"/>
  </g>
</svg>
