<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="hbg" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#3a1e0e" stop-opacity="1"/>
      <stop offset="30%" stop-color="#1e140a" stop-opacity="1"/>
      <stop offset="70%" stop-color="#0c0a08" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="emberSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2ca50" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurH"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blurS"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#hbg)"/>
  <!-- Big ember glows -->
  <circle cx="960" cy="540" r="300" fill="url(#emberSpot)" filter="url(#blurH)"/>
  <circle cx="400" cy="850" r="200" fill="url(#emberSpot)" filter="url(#blurH)" opacity="0.6"/>
  <circle cx="1600" cy="300" r="180" fill="url(#emberSpot)" filter="url(#blurH)" opacity="0.5"/>
  <!-- Scattered ember particles -->
  <g fill="#f2ca50">
    <circle cx="200" cy="200" r="1.5" opacity="0.7"/>
    <circle cx="400" cy="400" r="1.2" opacity="0.5"/>
    <circle cx="600" cy="150" r="1.8" opacity="0.8"/>
    <circle cx="800" cy="700" r="1" opacity="0.4"/>
    <circle cx="1000" cy="250" r="1.4" opacity="0.6"/>
    <circle cx="1200" cy="550" r="1.2" opacity="0.5"/>
    <circle cx="1400" cy="200" r="1.6" opacity="0.7"/>
    <circle cx="1600" cy="600" r="1" opacity="0.4"/>
    <circle cx="1800" cy="350" r="1.3" opacity="0.6"/>
    <circle cx="300" cy="800" r="1" opacity="0.4"/>
    <circle cx="700" cy="900" r="1.4" opacity="0.6"/>
    <circle cx="1100" cy="850" r="1.1" opacity="0.5"/>
    <circle cx="1500" cy="950" r="1.3" opacity="0.5"/>
    <circle cx="150" cy="500" r="1" opacity="0.4"/>
    <circle cx="1750" cy="150" r="1.2" opacity="0.5"/>
  </g>
  <!-- Smoky bands -->
  <g fill="#d4af37" opacity="0.04" filter="url(#blurS)">
    <ellipse cx="960" cy="540" rx="800" ry="120"/>
    <ellipse cx="960" cy="300" rx="600" ry="80"/>
    <ellipse cx="960" cy="780" rx="700" ry="100"/>
  </g>
  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig)"/>
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
</svg>
